<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>iSolarCloud — Autorisation</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 80px auto; text-align: center; }
    .code { font-size: 1.4em; background: #f0f0f0; padding: 12px 20px; border-radius: 8px; word-break: break-all; }
    .error { color: #c00; }
    .success { color: #0a0; }
  </style>
</head>
<body>
  <h1>🔆 iSolarCloud Callback</h1>
  <div id="result"></div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const state = params.get('state');
    const error = params.get('error');
    const el = document.getElementById('result');

    if (error) {
      el.innerHTML = `<p class="error">❌ Erreur : ${error}</p>`;
    } else if (code) {
      el.innerHTML = `<p class="success">✅ Autorisation réussie !</p>
        <p>Code d'autorisation :</p>
        <div class="code">${code}</div>
        ${state ? `<p>State : <code>${state}</code></p>` : ''}
        <p style="margin-top:24px;color:#888">Copie ce code et envoie-le moi.</p>`;
    } else {
      el.innerHTML = `<p class="error">⚠️ Aucun code reçu.</p>
        <p>Paramètres : <code>${window.location.search || '(aucun)'}</code></p>`;
    }
  </script>
</body>
</html>
