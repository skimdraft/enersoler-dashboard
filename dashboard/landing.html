<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enersoler — Dashboard Solaire Tahiti</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Outfit', system-ui, sans-serif; background: #0d0d12; color: #e8e8e0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 28px; padding: 20px; }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-text { font-size: 1.8em; font-weight: 800; color: #c3cd22; letter-spacing: 0.04em; }
  .subtitle { color: rgba(195,205,34,0.5); font-size: 0.95em; text-align: center; max-width: 500px; line-height: 1.5; }
  h1 { font-size: 1.4em; font-weight: 600; margin-top: 12px; }
  .links { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; }
  .links a {
    display: block; background: rgba(195,205,34,0.1); color: #c3cd22;
    padding: 16px 32px; border-radius: 14px; text-decoration: none;
    font-weight: 700; font-size: 1.05em; border: 1px solid rgba(195,205,34,0.2);
    transition: all 0.2s; text-align: center; min-width: 160px;
  }
  .links a:hover { background: rgba(195,205,34,0.2); border-color: rgba(195,205,34,0.4); transform: translateY(-1px); }
  .links a.main { background: #c3cd22; color: #0d0d12; border: none; font-size: 1.1em; }
  .links a.main:hover { opacity: 0.85; }
  .label { font-size: 0.7em; opacity: 0.5; display: block; margin-top: 4px; }
  .eq-bars { display: flex; align-items: flex-end; gap: 3px; height: 34px; }
  .eq-bars span { display: block; width: 4px; border-radius: 2px; background: #c3cd22; animation: eq 2.4s ease-in-out infinite; box-shadow: 0 0 8px rgba(195,205,34,0.5); }
  .eq-bars span:nth-child(1){height:20px;animation-delay:0s}
  .eq-bars span:nth-child(2){height:34px;animation-delay:0.3s}
  .eq-bars span:nth-child(3){height:14px;animation-delay:0.6s}
  .eq-bars span:nth-child(4){height:28px;animation-delay:0.9s}
  .eq-bars span:nth-child(5){height:10px;animation-delay:1.2s}
  @keyframes eq { 0%,100%{transform:scaleY(0.3);opacity:0.4} 50%{transform:scaleY(1);opacity:1} }
  .live-dot { display: inline-block; width: 8px; height: 8px; background: #c3cd22; border-radius: 50%; margin-right: 6px; animation: pulse 2s infinite; box-shadow: 0 0 8px #c3cd22; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .footer { color: rgba(195,205,34,0.3); font-size: 0.7em; margin-top: 40px; text-align: center; line-height: 1.6; }
</style>
</head>
<body>
  <div class="logo">
    <div class="eq-bars"><span></span><span></span><span></span><span></span><span></span></div>
    <span class="logo-text">ENERSOLER</span>
  </div>
  <h1>Dashboard Solaire</h1>
  <p class="subtitle"><span class="live-dot"></span>Données temps réel iSolarCloud · Mise à jour automatique chaque minute · Tahiti 🇵🇫</p>

  <div class="links">
    <a href="dashboard.html" class="main">📊 Vue Globale<span class="label">Production totale</span></a>
    <a href="paea.html">🏫 Collège de Paea<span class="label">50.5 kWc</span></a>
    <a href="temana.html">🏢 Temana Import<span class="label">58 kWc</span></a>
    <a href="upf.html">🏭 UPF BAT A<span class="label">206.4 kWc</span></a>
  </div>

  <p class="footer">Enersoler · Vente &amp; installation photovoltaïque à Tahiti<br>
  <a href="https://enersoler.com" style="color:inherit">enersoler.com</a></p>
</body>
</html>
