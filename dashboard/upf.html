  .hdr-m { display:flex;align-items:center;gap:0.8vw; }
  .chip { font-family:'JetBrains Mono',monospace;font-size:clamp(0.42em,0.75vw,0.65em);padding:0.3vh 1vw;border-radius:3vh;border:1px solid rgba(195,205,34,0.3);color:var(--gold);background:rgba(195,205,34,0.04);letter-spacing:0.05em;text-transform:uppercase; }

  .info-line { font-size:clamp(0.7em,1vw,0.9em);color:var(--gold);font-weight:700;line-height:1.2;overflow:hidden;text-overflow:ellipsis; }
  .info-sub { font-size:clamp(0.45em,0.6vw,0.55em);color:rgba(195,205,34,0.5);text-transform:uppercase;letter-spacing:0.05em;line-height:1.2;margin-bottom:0.1vh; }

  .icon-thermo { display:inline-block;vertical-align:middle;font-size:inherit; }

  canvas { width:100%!important;height:100%!important; }

  .mini-card { display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:0.3vh;overflow:hidden; }
  .mini-val { font-size:clamp(0.9em,min(3.2vw,7vh),3em);font-weight:900;color:var(--gold);line-height:1; }
  .mini-lbl { font-size:clamp(0.3em,min(0.85vw,2.5vh),0.75em);color:#fff;opacity:0.75;text-align:center;text-transform:uppercase;letter-spacing:0.04em;line-height:1.3; }
  .mini-icon { font-size:clamp(1em,min(3.5vw,7vh),3.5em);line-height:1; }

  /* INFO BAR (fond vert) */
  .btm { display:flex;align-items:center;justify-content:space-around;width:100%;height:100%; }
  .btm-row { text-align:center;position:relative;padding:0.6vh 1vw; }
  .btm-row::before { content:'';position:absolute;inset:0;border:1px solid rgba(195,205,34,0.25);border-radius:clamp(8px,1vw,14px);clip-path:polygon(0 10px,10px 0,calc(100% - 10px) 0,100% 10px,100% calc(100% - 10px),calc(100% - 10px) 100%,10px 100%,0 calc(100% - 10px));animation:framePulse 2s ease-in-out infinite; }
  @keyframes framePulse { 0%,100%{border-color:rgba(195,205,34,0.15);box-shadow:inset 0 0 8px rgba(195,205,34,0.03)} 50%{border-color:rgba(195,205,34,0.4);box-shadow:inset 0 0 20px rgba(195,205,34,0.1),0 0 15px rgba(195,205,34,0.08)} }

  @keyframes valGlow { 0%,100%{text-shadow:0 0 20px rgba(255,255,255,0.1)} 50%{text-shadow:0 0 40px rgba(255,255,255,0.25),0 0 80px rgba(255,255,255,0.08)} }

// ── Daily lookup (history_daily format: [{date, kwh, paea_kwh?, temana_kwh?}]) ──
function dailyLookup(history, slug) {
  const map = {};
  for (const e of history || []) {
    if (!e.date) continue;
    const val = e[slug + '_kwh'] || e.kwh || 0;
    map[e.date] = { kwh: val };
  }
  return map;
}
function getLast7Days() {
  const now=new Date(), days=[];
  for(let i=6;i>=0;i--){ const d=new Date(now);d.setDate(now.getDate()-i); days.push({iso:d.toLocaleDateString('fr-CA',{timeZone:TAHITI}),l:i===0?'Auj.':d.toLocaleDateString('fr-FR',{weekday:'short',timeZone:TAHITI}),v:0}); }
  return days;
}
function getLast30Days() {
  const now=new Date(), days=[];
  for(let i=29;i>=0;i--){ const d=new Date(now);d.setDate(now.getDate()-i); days.push({iso:d.toLocaleDateString('fr-CA',{timeZone:TAHITI}),l:i===0?'Auj.':String(d.getDate()),v:0}); }
  return days;
}
function getLast12Months() {
  const now=new Date(), months=[];
  const mNames=['J','F','M','A','M','J','J','A','S','O','N','D'];
  for(let i=11;i>=0;i--){ const d=new Date(now.getFullYear(),now.getMonth()-i,1); months.push({key:d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'),l:mNames[d.getMonth()],v:0}); }
  return months;
}
// ── Monthly from daily ──
function monthlyFromDaily(history, slug) {
  const mo = {};
  for (const e of history || []) {
    if (!e.date) continue;
    const m = e.date.substring(0, 7);
    if (!mo[m]) mo[m] = { kwh: 0 };
    const val = e[slug + '_kwh'] || e.kwh || 0;
    mo[m].kwh += val;
  }
  return mo;
}

  destroy();
  const plant = (data.plants||[]).find(p=>String(p.id)===PLANT_ID);
  if(!plant) return;

  document.getElementById('updateTime').innerHTML='<span class="dot"></span>'+(data.updateTime||'')+(data.authWarning?' <span style="color:#f97316;font-size:0.8em">⚠ '+data.authWarning+'</span>':'');
  document.getElementById('liveKva').textContent=fmt(plant.live_power_kva,1);
  document.getElementById('installDate').textContent=plant.install_date ? new Date(plant.install_date).toLocaleDateString('fr-FR',{timeZone:TAHITI}) : '--';

  const expected = Math.round(plant.capacity_kwp * 3.84);
  const histLive = data.history || []; // 5-min points (today only)
  // Today kWh from 5-min live data
  const histDaily = (histLive||[]).filter(p=>p.time&&p.time.startsWith(todayDate)).reduce((s,p)=>{const pw=p[plant.slug+'_power'];return s+(pw>0?pw*(5/60):0);},0);
  const effectiveDaily = plant.daily_kwh!==null?plant.daily_kwh:(histDaily>0?Math.round(histDaily*10)/10:null);
  const pct = plant.capacity_kwp>0&&effectiveDaily?Math.min(100,Math.round(effectiveDaily/expected*100)):0;

  document.getElementById('dailyKwh').textContent=effectiveDaily!==null?fmt(effectiveDaily,1):'--';
  document.getElementById('totalMwh').textContent=fmt(plant.total_mwh,1);
  document.getElementById('capacity').textContent=fmt(plant.capacity_kwp,1);
  document.getElementById('temperature').textContent=fmt(plant.temperature,1);
  document.getElementById('co2').textContent=fmt(plant.total_mwh*0.7,1);
  document.getElementById('gaugePct').textContent=pct+'%';
  var objKwhEl = document.getElementById('objKwh'); if (objKwhEl) objKwhEl.textContent=fmt(expected,0);
  document.getElementById('gaugeFill').style.background='conic-gradient(var(--gold) '+(pct*3.6)+'deg, rgba(255,255,255,0.05) 0deg)';

  const raw = dailyLookup(data.history_daily || [], plant.slug);

  // Power chart (5-min data) - interpolate gaps
  const todayHist=histLive.filter(p=>{if(!p.time||!p.time.startsWith(todayDate))return false;const h=new Date(p.time).getHours();return h>=5&&h<19;});
  const labels=todayHist.map(p=>{const t=new Date(p.time);return String(t.getHours()).padStart(2,'0')+':'+String(t.getMinutes()).padStart(2,'0');});
  let power=todayHist.map(p=>p[plant.slug+'_power']);
  // Linear interpolation for gaps (only between real values, future slots → 0)
  for (let i=0;i<power.length;i++) {
    if (power[i]!==null&&power[i]!==undefined) continue;
    let left=null,right=null;
    for (let j=i-1;j>=0;j--) { if (power[j]!=null) { left={val:power[j],idx:j}; break; } }
    for (let j=i+1;j<power.length;j++) { if (power[j]!=null) { right={val:power[j],idx:j}; break; } }
    if (left&&right) {
      const t=(i-left.idx)/(right.idx-left.idx);
      power[i]=+(left.val+(right.val-left.val)*t).toFixed(1);
    } else if (!right) {
      // No future data = slot hasn't happened yet, set to 0
      power[i]=0;
    }
  }
  if(todayHist.length>1){
    const maxP=Math.max(...power.filter(v=>v!==null&&v>0),1);
    new Chart(document.getElementById('chPwr'),{
      type:'line',data:{labels,datasets:[{data:power,borderColor:'rgba(195,205,34,0.9)',backgroundColor:ctx=>{const g=ctx.chart.ctx.createLinearGradient(0,0,0,200);g.addColorStop(0,'rgba(195,205,34,0.12)');g.addColorStop(1,'transparent');return g;},fill:true,borderWidth:2.5,tension:0.3,pointRadius:0,pointHoverRadius:4,spanGaps:true}]},
      options:{responsive:true,maintainAspectRatio:false,animation:{duration:300},layout:{padding:{bottom:14}},plugins:{legend:{display:false},tooltip:{backgroundColor:'rgba(6,6,12,0.96)',titleColor:'#c3cd22',bodyColor:'#fff',borderColor:'rgba(195,205,34,0.2)',borderWidth:1,callbacks:{label:c=>' '+fmt(c.raw,1)+' kVA'}}},scales:{x:{ticks:{color:'rgba(255,255,255,0.2)',font:{size:8,family:'JetBrains Mono'},maxTicksLimit:14,autoSkip:false,callback:(_,i)=>(labels[i]||'').endsWith(':00')?labels[i]:''},grid:{color:'rgba(195,205,34,0.04)'}},y:{ticks:{color:'rgba(255,255,255,0.2)',font:{size:8,family:'JetBrains Mono'},callback:v=>v+' kW',padding:4},grid:{color:'rgba(195,205,34,0.04)'},min:0,suggestedMax:Math.ceil(maxP*1.15)}}}
    });
    _charts.push(Chart.getChart('chPwr'));
  }

  // Chart caps adaptatifs par rapport a la capacite (kWp * soleil ~5h/jour pour daily, ~0.15 MWh/kWp/mois pour monthly)
  const dailyCap = Math.max(400, Math.ceil(plant.capacity_kwp * 5));
  const monthlyCap = Math.max(2, Math.ceil(plant.capacity_kwp * 0.15));

  // Weekly
  const wDays=getLast7Days();let wMax=1;wDays.forEach(d=>{if(raw[d.iso]){d.v=Math.round(raw[d.iso].kwh*10)/10;if(d.v>wMax)wMax=d.v;}});
  barChart('chWeek',wDays,Math.min(Math.ceil(wMax*1.2),dailyCap),{r:8,bp:0.65,cp:0.85,fs:9,mt:7,as:true});

  // Monthly (affiche uniquement le numéro du jour)
  const mDays=getLast30Days();let mMax=1;mDays.forEach(d=>{if(raw[d.iso]){d.v=Math.round(raw[d.iso].kwh*10)/10;if(d.v>mMax)mMax=d.v;}});
  barChart('chMonth',mDays,Math.min(Math.ceil(mMax*1.2),dailyCap),{r:5,bp:0.92,cp:0.96,fs:7,mr:70,as:false,mt:10});

  // Annual (prefer API monthly data, fall back to daily aggregation)
  const mAgg = {};
  if (data.history_monthly) {
    for (const e of data.history_monthly) {
      mAgg[e.month] = { kwh: e[plant.slug + '_kwh'] || 0 };
    }
  } else {
    Object.assign(mAgg, monthlyFromDaily(data.history_daily || [], plant.slug));
  }
  const yearMonths=getLast12Months();let yMax=1;yearMonths.forEach(m=>{if(mAgg[m.key]){m.v=Math.round(mAgg[m.key].kwh/100)/10;if(m.v>yMax)yMax=m.v;}});
  barChart('chYear',yearMonths,yMax>0?Math.ceil(yMax*1.2):monthlyCap,{r:8,bp:0.65,cp:0.85,fs:10,mt:12,as:false,unit:'MWh'});

  loadWeather();
}

try {
  render(INLINE_DATA);
  setInterval(async()=>{try{const r=await fetch('https://skimdraft.github.io/enersoler-dashboard/isolar-data.json?_='+Date.now(),{cache:'no-cache'});if(r.ok){const d=await r.json();if(d&&d.plants){try{const hr=await fetch('https://skimdraft.github.io/enersoler-dashboard/history-daily.json?_='+Date.now(),{cache:'no-cache'});if(hr.ok){const hd=await hr.json();if(Array.isArray(hd)&&hd.length>0)d.history_daily=hd;else d.history_daily=INLINE_DATA.history_daily;}else d.history_daily=INLINE_DATA.history_daily;}catch(e){d.history_daily=INLINE_DATA.history_daily;}d.history_monthly=INLINE_DATA.history_monthly;render(d);}}}catch(e){}},60000);
}catch(e){document.querySelector('.grid').innerHTML+='<div style="padding:30px;color:rgba(255,255,255,0.3);text-align:center">⚠ '+e.message+'</div>';}
</script>
</body>
</html>
