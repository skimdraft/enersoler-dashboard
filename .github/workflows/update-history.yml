name: Update History

on:
  schedule:
    # Cible ~21h17 Tahiti (07:17 UTC), tot dans la fenetre calme 19h-5h.
    # POURQUOI si tot: le cron GitHub est best effort et part AVEC du retard
    # (observe: +5h). En visant 21h, un retard typique tombe vers ~2h du matin,
    # et meme un gros retard reste avant 5h (ouverture de la fenetre live).
    # Minute off-peak (:17) car GitHub jette plus les crons "pile" (:00).
    # Filet de securite: le push est protege (rebase+retry) si course avec un run live.
    - cron: '17 7 * * *'
  workflow_dispatch:

concurrency:
  group: dashboard-history
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  history:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Create .env from secrets
        run: |
          echo "ISOLAR_APP_KEY=${{ secrets.ISOLAR_APP_KEY }}" >> .env
          echo "ISOLAR_APP_SECRET=${{ secrets.ISOLAR_APP_SECRET }}" >> .env

      - name: Fetch history + real-time data
        working-directory: dashboard
        run: node extract.js --history
        timeout-minutes: 4

      - name: Build HTML pages
        working-directory: dashboard
        run: node build.js

      - name: Copy HTML to docs/
        run: |
          cp dashboard/dashboard.html docs/
          cp dashboard/paea.html docs/
          cp dashboard/temana.html docs/
          cp dashboard/isolar-data.json docs/
          cp dashboard/history-daily.json docs/
          cp dashboard/history-monthly.json docs/

      - name: Commit and push changes
        run: |
          git config user.name "Enersoler Bot"
          git config user.email "bot@enersoler.com"
          git add dashboard/history-daily.json dashboard/history-monthly.json
          git add dashboard/isolar-data.json dashboard/isolar-tokens.json
          git add dashboard/history.json dashboard/daily-baseline.json
          git add dashboard/dashboard.html dashboard/paea.html dashboard/temana.html
          git add docs/dashboard.html docs/paea.html docs/temana.html docs/index.html docs/isolar-data.json docs/history-daily.json docs/history-monthly.json
          git diff --staged --quiet && echo "Rien de nouveau" && exit 0
          git commit -m "history: $(TZ='Pacific/Tahiti' date +'%d/%m %H:%M') -- daily+monthly refresh"
          # Push protege : si un run live pousse entre notre checkout et notre push,
          # on rebase (-X theirs = nos fichiers history fraichement calcules gagnent
          # les conflits ; le prochain run live <5 min rafraichit le temps reel).
          for i in 1 2 3; do
            git push && exit 0
            echo "Push rejete (tentative $i), rebase sur origin/master..."
            git pull --rebase -X theirs
            sleep 5
          done
          git push
