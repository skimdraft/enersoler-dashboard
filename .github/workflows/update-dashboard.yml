name: Update Dashboard

on:
  schedule:
    # Every 5 min during daylight Tahiti (7h-18h = UTC 17h-04h)
    # Split into two ranges to avoid midnight-wrap cron issues
    - cron: '*/5 17-23 * * *'   # 17h-23h UTC = 7h-13h Tahiti
    - cron: '*/5 0-4 * * *'     # 0h-4h UTC = 14h-18h Tahiti
  workflow_dispatch:

concurrency:
  group: dashboard-update
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create .env from secrets
        run: |
          echo "ISOLAR_APP_KEY=*** secrets.ISOLAR_APP_KEY }}" >> .env
          echo "ISOLAR_APP_SECRET=*** secrets.ISOLAR_APP_SECRET }}" >> .env

      - name: Fast Extract (real-time only)
        working-directory: dashboard
        run: node extract-fast.js
        timeout-minutes: 1

      - name: Build HTML pages
        working-directory: dashboard
        run: node build.js

      - name: Copy HTML to docs/
        run: |
          cp dashboard/dashboard.html docs/
          cp dashboard/paea.html docs/
          cp dashboard/temana.html docs/
          cp dashboard/isolar-data.json docs/

      - name: Commit and push changes
        run: |
          git config user.name "Enersoler Bot"
          git config user.email "bot@enersoler.com"
          git add dashboard/isolar-data.json dashboard/isolar-tokens.json
          git add dashboard/history.json dashboard/daily-baseline.json
          git add dashboard/dashboard.html dashboard/paea.html dashboard/temana.html
          git add docs/dashboard.html docs/paea.html docs/temana.html docs/index.html docs/isolar-data.json
          git diff --staged --quiet || (
            git commit -m "data: $(TZ='Pacific/Tahiti' date +'%d/%m %H:%M') -- refresh" &&
            git push
          )
