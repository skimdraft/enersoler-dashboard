name: Update Dashboard

# Declenche UNIQUEMENT de l'exterieur (cron-job.org toutes les 5 min)
# et manuellement. Plus de cron GitHub (throttle ~3h) ni d'auto-dispatch.
on:
  workflow_dispatch:

# Empeche deux runs de se marcher dessus (evite les conflits de push)
concurrency:
  group: dashboard-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Check schedule
        id: guard
        run: |
          HOUR=$(TZ='Pacific/Tahiti' date +%H)
          MIN=$(TZ='Pacific/Tahiti' date +%M)
          if [ "$HOUR" -ge 5 ] && [ "$HOUR" -lt 19 ]; then
            echo "Day (${HOUR}h${MIN}), run"
            echo "run=yes" >> "$GITHUB_OUTPUT"
          else
            echo "Night (${HOUR}h${MIN}), skip"
            echo "run=no" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v5
        if: steps.guard.outputs.run == 'yes'
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - uses: actions/setup-node@v5
        if: steps.guard.outputs.run == 'yes'
        with:
          node-version: '20'

      - name: Create .env
        if: steps.guard.outputs.run == 'yes'
        run: |
          echo "ISOLAR_APP_KEY=${{ secrets.ISOLAR_APP_KEY }}" >> .env
          echo "ISOLAR_APP_SECRET=${{ secrets.ISOLAR_APP_SECRET }}" >> .env

      - name: Extract & Build
        if: steps.guard.outputs.run == 'yes'
        working-directory: dashboard
        run: |
          node extract-fast.js
          node build.js

      - name: Copy to docs
        if: steps.guard.outputs.run == 'yes'
        run: |
          cp dashboard/dashboard.html docs/
          cp dashboard/paea.html docs/
          cp dashboard/temana.html docs/
          cp dashboard/isolar-data.json docs/
          cp dashboard/history-daily.json docs/
          cp dashboard/history-monthly.json docs/

      - name: Commit & Push
        if: steps.guard.outputs.run == 'yes'
        run: |
          git config user.name "Enersoler Bot"
          git config user.email "bot@enersoler.com"
          git add dashboard/isolar-data.json dashboard/isolar-tokens.json
          git add dashboard/history.json dashboard/daily-baseline.json
          git add dashboard/dashboard.html dashboard/paea.html dashboard/temana.html
          git add docs/dashboard.html docs/paea.html docs/temana.html
          git add docs/index.html docs/isolar-data.json docs/history-daily.json docs/history-monthly.json
          git diff --staged --quiet && echo "Rien de nouveau" && exit 0
          git commit -m "data: $(TZ='Pacific/Tahiti' date +'%d/%m %H:%M') -- refresh"
          git push || (git pull --rebase -X ours && git push)
