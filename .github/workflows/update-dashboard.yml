name: Update Dashboard

on:
  schedule:
    # Every 5 min, 7h-18h Tahiti (UTC-10) = 17h-04h UTC
    - cron: '*/5 17-23,0-4 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'dashboard/**'
      - '.github/workflows/update-dashboard.yml'

concurrency:
  group: dashboard-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create .env from secrets
        run: |
          echo "ISOLAR_APP_KEY=${{ secrets.ISOLAR_APP_KEY }}" >> .env
          echo "ISOLAR_APP_SECRET=${{ secrets.ISOLAR_APP_SECRET }}" >> .env

      - name: Fetch iSolarCloud data
        working-directory: dashboard
        run: node extract.js
        timeout-minutes: 3

      - name: Build HTML pages
        working-directory: dashboard
        run: node build.js

      - name: Copy HTML to docs/
        run: |
          cp dashboard/dashboard.html docs/
          cp dashboard/paea.html docs/
          cp dashboard/temana.html docs/
          cp dashboard/isolar-data.json docs/

      - name: Commit and push changes
        run: |
          git config user.name "Enersoler Bot"
          git config user.email "bot@enersoler.com"
          git add dashboard/isolar-data.json dashboard/isolar-tokens.json
          git add dashboard/history.json dashboard/history-daily.json dashboard/history-monthly.json
          git add dashboard/daily-baseline.json
          git add dashboard/dashboard.html dashboard/paea.html dashboard/temana.html
          git add docs/dashboard.html docs/paea.html docs/temana.html docs/index.html
          git diff --staged --quiet || (
            git commit -m "data: $(TZ='Pacific/Tahiti' date +'%d/%m %H:%M') -- refresh" &&
            git push
          )
